# samples/insecure_nested_config.conf
# Insecure nested configuration — sensitive keys with plaintext values.
# Used to test CFG validation with nested sections that have security violations.

APP_NAME = chomsky;
APP_VERSION = 1.0;
DEBUG = true;

# Database section with INSECURE plaintext credentials
database {
    host = 192.168.1.50;
    port = 5432;
    name = production;

    # Nested credentials — INSECURE: sensitive keys with literal values
    credentials {
        db_password = hunter2;
        db_pass = admin123;
    }

    # Connection pool (non-sensitive — these are OK)
    pool {
        min_connections = 1;
        max_connections = 100;
    }
}

# API section with INSECURE plaintext tokens
api {
    base_url = http://internal.api.corp.com;

    auth {
        api_key = abc123plaintext;
        auth_token = token_hardcoded_value_here;
        secret = mysupersecretvalue;
    }
}

# Expected CFG validation result:
# is_valid  = True  (syntax is correct)
# is_secure = False (sensitive keys have literal values)
# errors:
#   - Sensitive key 'db_password' must use ${VAR} reference
#   - Sensitive key 'db_pass' must use ${VAR} reference
#   - Sensitive key 'api_key' must use ${VAR} reference
#   - Sensitive key 'auth_token' must use ${VAR} reference
#   - Sensitive key 'secret' must use ${VAR} reference
