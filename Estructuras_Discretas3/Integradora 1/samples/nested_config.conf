# samples/nested_config.conf
# Nested configuration file — tests the CFG validator's recursive Section production.
# This file exercises: nested sections, sensitive keys, env references, and violations.

# ─── Top-level entries (global scope) ───
APP_NAME = chomsky;
APP_VERSION = 1.0;
LOG_LEVEL = info;
DEBUG = false;

# ─── Database section (SECURE — uses env references) ───
database {
    host = localhost;
    port = 5432;
    name = chomsky_db;

    # Nested credentials block
    credentials {
        db_password = ${DB_MASTER_PASSWORD};
        db_pass = ${DB_REPLICA_PASSWORD};
    }

    # Nested pool configuration
    pool {
        min_connections = 2;
        max_connections = 20;
        timeout = 30;
    }
}

# ─── API section (SECURE) ───
api {
    base_url = https://api.internal.com;
    timeout = 10;
    retry_attempts = 3;

    auth {
        api_key = ${EXTERNAL_API_KEY};
        auth_token = ${API_AUTH_TOKEN};
    }
}

# ─── Cache section (non-sensitive, plain values OK) ───
cache {
    driver = redis;
    host = localhost;
    port = 6379;
    ttl = 3600;
}